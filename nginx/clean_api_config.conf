# NGINX Configuration for MARK Corpotax Backend API
# Domain: api.markcorpotax.com
# Express.js Application running on port 5000

server {
    listen 80;
    listen [::]:80;
    server_name api.markcorpotax.com;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.markcorpotax.com;

    # SSL Certificates (Certbot will manage these paths automatically, but we placeholder them)
    # The actual paths are inserted by Certbot. If you copy this file, 
    # Certbot might have already added its own block. 
    # BUT for safety, we assume Certbot has its own include or you will run certbot again.
    
    # NOTE: Since you already ran Certbot, look for lines starting with 'ssl_certificate'
    # in your current config. Ideally, Certbot manages the SSL block.
    # We will assume Certbot injected headers are managed elsewhere or included.
    # However, to overwrite properly, you should simple keep the 'location /' clean.

    # Logging
    access_log /var/log/nginx/api.markcorpotax.access.log;
    error_log /var/log/nginx/api.markcorpotax.error.log;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types application/json application/javascript text/plain;

    # Client body size limit
    client_max_body_size 10M;

    # Main API location
    location / {
        # PROXY HEADERS (Required for Express)
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # CORS: COMPLETELY REMOVED FROM NGINX
        # We let Node.js/Express handle CORS via the 'cors' package.
        # DO NOT add 'add_header Access-Control-Allow-Origin' here.
    }
}
